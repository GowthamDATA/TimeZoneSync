<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZoneSync — Live World Clock & Timezone Converter</title>
  <meta name="description" content="ZoneSync: Free live world clock showing current time in every timezone. Compare cities, convert time zones, and plan across the globe in real time." />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Nunito:wght@400;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── THEME TOKENS ── */
    :root {
      --accent: #7c6dfa;
      --accent2: #f0a05a;
      --red: #f05a5a;
      --green: #4ade80;
    }

    [data-theme="dark"] {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: #2a2a36;
      --text: #f0eff8;
      --muted: #6b6a7e;
      --toggle-icon: "☀️";
      --slider-track: #18181f;
      --card-glow: rgba(124,109,250,0.05);
      --day-bg: #1e1b10;
      --night-bg: #0f0f18;
    }

    [data-theme="light"] {
      --bg: #f4f4f8;
      --surface: #ffffff;
      --surface2: #f0f0f5;
      --border: #dddde8;
      --text: #0f0f1a;
      --muted: #8888a0;
      --toggle-icon: "🌙";
      --slider-track: #e4e4ee;
      --card-glow: rgba(124,109,250,0.03);
      --day-bg: #fffbeb;
      --night-bg: #f1f1f9;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 40px 24px 80px;
      transition: background 0.3s, color 0.3s;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,109,250,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,109,250,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.3s;
    }

    [data-theme="light"] body::before { opacity: 0.5; }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1140px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }

    .brand h1 .logo-icon {
      font-size: 26px;
      line-height: 1;
    }

    .brand h1 .brand-name { color: var(--text); }
    .brand h1 .brand-dot { color: var(--accent); }

    .brand h1 span.pulse-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2s infinite;
      margin-left: 2px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }

    .brand-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 5px;
      font-family: 'DM Mono', monospace;
    }

    #timeSourceBadge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      margin-top: 8px;
      transition: all 0.3s;
    }

    #timeSourceBadge.live {
      border-color: rgba(124,109,250,0.4);
      color: var(--accent);
      background: rgba(124,109,250,0.07);
    }

    #timeSourceBadge .indicator {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    #timeSourceBadge.live .indicator {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .theme-toggle-label {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
    }

      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px
