<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZoneSync — Premium World Clock & Timezone Matrix</title>
  <meta name="description" content="ZoneSync: Live world clock showing current time in every timezone." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --accent: #7c6dfa;
      --accent-rgb: 124, 109, 250;
      --accent2: #f0a05a;
      --red: #f05a5a;
      --green: #4ade80;
      --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --bg: #09090e;
      --surface: rgba(18, 18, 29, 0.6);
      --surface2: rgba(30, 30, 46, 0.5);
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.18);
      --text: #f0eff8;
      --muted: #8e8da4;
      --slider-track: #171725;
      --input-bg: rgba(255, 255, 255, 0.04);
    }

    [data-theme="light"] {
      --bg: #f3f3f8;
      --surface: rgba(255, 255, 255, 0.7);
      --surface2: rgba(230, 230, 240, 0.5);
      --border: rgba(0, 0, 0, 0.06);
      --border-strong: rgba(0, 0, 0, 0.14);
      --text: #0f0f1a;
      --muted: #6e6e82;
      --slider-track: #e2e2ec;
      --input-bg: rgba(0, 0, 0, 0.03);
    }

    body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; padding: 40px 24px; transition: var(--transition-smooth); }
    .container { max-width: 1200px; margin: 0 auto; position: relative; z-index: 2; }
    
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; flex-wrap: wrap; gap: 20px; }
    .brand h1 { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 700; display: flex; align-items: center; gap: 12px; }
    .brand-dot { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    
    .timeline-card { background: var(--surface); backdrop-filter: blur(16px); border: 1px solid var(--border-strong); border-radius: 24px; padding: 28px; margin-bottom: 30px; }
    .timeline-top { display: flex; justify-content: space-between; margin-bottom: 20px; }
    .timeline-label { font-family: 'Space Grotesk', sans-serif; font-size: 14px; font-weight: 700; color: var(--accent); }
    
    .clock-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
    .clock-card { background: var(--surface); border: 1px solid var(--border-strong); border-radius: 24px; padding: 28px; position: relative; overflow: hidden; }
    
    #bgCanvas { position: fixed; inset: 0; z-index: 0; }
  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="container">
  <header>
    <div class="brand"><h1>🌐 Zone<span class="brand-dot">Sync</span></h1></div>
    <div class="header-right">
       <button class="theme-toggle" onclick="toggleTheme()">Toggle Mode</button>
       <input type="text" id="citySearch" placeholder="Search cities..." oninput="debounceSearch(this.value)">
    </div>
  </header>

  <div class="timeline-card">
    <div class="timeline-top">
      <span class="timeline-label">⏱ Home Time Core Matrix</span>
      <span id="sliderDisplay">—</span>
    </div>
    <input type="range" id="masterSlider" min="0" max="1439" value="0" oninput="onSliderChange()" style="width:100%">
    <div class="timeline-bottom-controls">
        <button class="utility-btn" onclick="copyTimelineToClipboard()">📋 Copy Times</button>
        <button class="utility-btn" onclick="resetToNow()">↺ Sync to Real-Time</button>
    </div>
  </div>

  <div class="clock-grid" id="clockGrid"></div>
</div>

<script>
// Logic container: Optimized for persistence and synchronization
let trackedCities = JSON.parse(localStorage.getItem('zs-cities')) || [{name: "Bengaluru, India", iana: "Asia/Kolkata"}];
let homeCityIana = localStorage.getItem('zs-home') || "Asia/Kolkata";
let scrubOffsetMinutes = 0;

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('zonesync-theme', newTheme);
}

function resetToNow() {
  scrubOffsetMinutes = 0;
  renderClocks();
}

async function renderClocks() {
  const grid = document.getElementById('clockGrid');
  grid.innerHTML = '';
  // Implementation of clock rendering loop...
}

// Ensure all other functions (fetchOnlineTime, renderClocks, etc) are called here
(async () => {
  const theme = localStorage.getItem('zonesync-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  await fetchOnlineTime();
  renderClocks();
  setInterval(renderClocks, 1000);
})();
</script>
</body>
</html>
