<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZoneSync — Premium Live World Clock & Timezone Engine</title>
  <meta name="description" content="ZoneSync: Free live world clock showing current time in every timezone. Compare cities, convert time zones, and plan across the globe in real time." />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Nunito:wght@400;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── PREMIUM SYSTEM DESIGN TOKENS ── */
    :root {
      --accent: #7c6dfa;
      --accent-rgb: 124, 109, 250;
      --accent2: #f0a05a;
      --red: #f05a5a;
      --green: #4ade80;
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg: #06060a;
      --surface: rgba(17, 17, 24, 0.7);
      --surface-hover: rgba(24, 24, 35, 0.85);
      --surface2: #12121a;
      --border: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(124, 109, 250, 0.3);
      --text: #f0eff8;
      --muted: #807f93;
      --slider-track: #14141f;
      --glass-glow: rgba(124, 109, 250, 0.03);
    }

    [data-theme="light"] {
      --bg: #f4f4f8;
      --surface: rgba(255, 255, 255, 0.75);
      --surface-hover: rgba(255, 255, 255, 0.9);
      --surface2: #eaeaea;
      --border: rgba(0, 0, 0, 0.06);
      --border-hover: rgba(124, 109, 250, 0.4);
      --text: #0f0f1a;
      --muted: #6e6e82;
      --slider-track: #e2e2ec;
      --glass-glow: rgba(124, 109, 250, 0.01);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 40px 24px 80px;
      transition: background 0.4s ease, color 0.4s ease;
      overflow-x: hidden;
    }

    /* Soft Dynamic Mesh Background Grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124, 109, 250, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 109, 250, 0.015) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── HEADER NAVIGATION LAYOUT ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      margin-bottom: 48px;
      flex-wrap: wrap;
    }

    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand h1 .logo-icon { animation: rotateGlobe 20s linear infinite; }
    @keyframes rotateGlobe { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .brand h1 .brand-dot { color: var(--accent); }

    .brand-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
      font-family: 'DM Mono', monospace;
      letter-spacing: -0.01em;
    }

    #timeSourceBadge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 30px;
      background: rgba(var(--accent-rgb), 0.04);
      border: 1px solid var(--border);
      color: var(--muted);
      margin-top: 12px;
      transition: var(--transition-smooth);
    }

    #timeSourceBadge.live {
      border-color: rgba(var(--accent-rgb), 0.25);
      color: var(--accent);
      background: rgba(var(--accent-rgb), 0.08);
    }

    #timeSourceBadge .indicator {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }

    #timeSourceBadge.live .indicator {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulseGlow 2s infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    /* ── SWITCH CONTROLLER ── */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .theme-toggle-label {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .toggle-track {
      width: 48px; height: 26px;
      border-radius: 30px;
      background: var(--surface2);
      border: 1px solid var(--border);
      position: relative;
      transition: var(--transition-smooth);
    }

    .toggle-track.on {
      background: rgba(var(--accent-rgb), 0.15);
      border-color: rgba(var(--accent-rgb), 0.3);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.2s;
      font-size: 11px;
      display: flex; align-items: center; justify-content: center;
    }

    .toggle-track.on .toggle-thumb {
      transform: translateX(22px);
      background: var(--accent);
    }

    /* ── SEARCH HOVER BLOCK ── */
    .search-wrap {
      position: relative;
      width: 320px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px 14px 48px;
      font-size: 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: var(--transition-smooth);
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(124, 109, 250, 0.12);
      background: var(--surface-hover);
    }

    .search-wrap svg {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 18px; height: 18px;
      pointer-events: none;
      transition: var(--transition-smooth);
    }

    .search-wrap input:focus + svg { color: var(--accent); }

    #suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      z-index: 100;
      display: none;
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
    }

    #suggestions .suggestion-item {
      padding: 12px 18px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s ease;
    }

    #suggestions .suggestion-item:hover { background: rgba(124, 109, 250, 0.08); }
    #suggestions .suggestion-item .tz-hint { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

    /* ── TIME SYSTEM SCRUBBER CARD ── */
    .timeline-card {
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 32px;
      margin-bottom: 40px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.02);
    }

    .timeline-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .timeline-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
    }

    #sliderDisplay {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(124, 109, 250, 0.06);
      padding: 4px 12px;
      border-radius: 8px;
    }

    .tick-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .tick-row span {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    input[type="range"].time-slider {
      -webkit-appearance: none;
      width: 100%; height: 6px;
      border-radius: 4px;
      background: var(--slider-track);
      outline: none;
      cursor: pointer;
    }

    input[type="range"].time-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--accent);
      border: 4px solid var(--bg);
      box-shadow: 0 0 12px rgba(124, 109, 250, 0.4);
      cursor: pointer;
      transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: -9px;
    }

    input[type="range"].time-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .reset-btn { margin-top: 16px; display: flex; justify-content: flex-end; }
    .reset-btn button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 16px;
      border-radius: 10px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .reset-btn button:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,109,250,0.02); }

    /* ── GLASSMORPHIC CLOCK DASHBOARD GRID ── */
    .clock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .clock-card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .clock-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-hover);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.04);
    }

    .clock-card.is-home {
      border-color: rgba(124, 109, 250, 0.4);
      box-shadow: 0 8px 24px rgba(124, 109, 250, 0.06);
    }

    /* Ambient Dynamic Backdrop Orbs */
    .clock-card::after {
      content: '';
      position: absolute;
      width: 140px; height: 140px;
      top: -40px; right: -40px;
      border-radius: 50%;
      z-index: -1;
      filter: blur(40px);
      opacity: 0.15;
      transition: background 0.5s ease;
    }

    /* Core Dynamic Light Condition Variations */
    .clock-card.ambient-morning::after   { background: #f0a05a; }
    .clock-card.ambient-afternoon::after { background: #38bdf8; }
    .clock-card.ambient-evening::after   { background: #f97316; }
    .clock-card.ambient-night::after     { background: #a855f7; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .city-identity {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-orb {
      font-size: 22px;
      line-height: 1;
    }

    .city-name {
      font-family: 'Syne', sans-serif;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .tz-info {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }

    .date-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .time-display-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .input-time-engine {
      display: inline-flex;
      align-items: center;
      font-family: 'Nunito', sans-serif;
      font-size: 48px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .input-time-engine input {
      background: transparent;
      border: none;
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      color: var(--text);
      width: 62px;
      padding: 0;
      text-align: center;
      outline: none;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .input-time-engine input:focus {
      background: rgba(124, 109, 250, 0.08);
    }

    .divider-dots {
      animation: flashDot 2s infinite;
      user-select: none;
      opacity: 0.8;
    }

    @keyframes flashDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    .seconds-counter {
      font-family: 'Nunito', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      margin-left: 6px;
    }

    .ampm-trigger {
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      padding: 2px 6px;
      border-radius: 6px;
      transition: var(--transition-smooth);
      margin-left: 6px;
    }

    .ampm-trigger:hover { background: rgba(124, 109, 250, 0.12); }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      font-size: 12px;
    }

    .day-pill {
      padding: 3px 10px;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      background: var(--surface2);
      color: var(--muted);
    }

    .day-pill.ahead { color: var(--accent2); background: rgba(240,160,90,0.06); border: 1px solid rgba(240,160,90,0.15); }
    .day-pill.behind { color: var(--red); background: rgba(240,90,90,0.06); border: 1px solid rgba(240,90,90,0.15); }

    .footer-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .home-btn, .remove-btn {
      background: transparent;
      border: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      opacity: 0;
      padding: 4px 8px;
      border-radius: 6px;
      transition: var(--transition-smooth);
    }

    .home-btn { color: var(--muted); }
    .clock-card.is-home .home-btn { color: var(--accent2); opacity: 1; font-weight: 600; }
    .remove-btn { color: var(--red); }

    .clock-card:hover .home-btn,
    .clock-card:hover .remove-btn { opacity: 0.7; }
    .home-btn:hover, .remove-btn:hover { opacity: 1 !important; background: var(--surface2); }

    /* Toast Overlay Layout */
    #toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      opacity: 0;
      transition: var(--transition-smooth);
      pointer-events: none;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      body { padding: 24px 16px 60px; }
      header { flex-direction: column; align-items: flex-start; }
      .header-right { width: 100%; justify-content: space-between; }
      .search-wrap { width: 100%; max-width: none; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="brand">
      <h1>
        <span class="logo-icon">🌐</span>
        <span class="brand-name">Zone<span class="brand-dot">Sync</span></span>
      </h1>
      <p class="brand-sub">// premium fluid world clock &amp; time matrix</p>
      <div id="timeSourceBadge">
        <span class="indicator"></span>
        <span id="badgeText">synchronizing cosmic atomic clocks…</span>
      </div>
    </div>

    <div class="header-right">
      <div class="theme-toggle" onclick="toggleTheme()" title="Switch visual style profiles">
        <span class="theme-toggle-label" id="themeLabel">Dark mode</span>
        <div class="toggle-track on" id="toggleTrack">
          <div class="toggle-thumb" id="toggleThumb">🌙</div>
        </div>
      </div>

      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" id="citySearch" placeholder="Type city, region, or terminal node..."
          autocomplete="off" oninput="debounceSearch(this.value)" onkeydown="handleSearchKey(event)" />
        <div id="suggestions"></div>
      </div>
    </div>
  </header>

  <div class="timeline-card">
    <div class="timeline-top">
      <span class="timeline-label" id="scrubberLabel">⏱ Temporal Slider Engine</span>
      <span id="sliderDisplay">—</span>
    </div>
    <div class="tick-row">
      <span>12 AM</span><span>6 AM</span><span>12 PM</span><span>6 PM</span><span>11:59 PM</span>
    </div>
    <input type="range" id="masterSlider" class="time-slider" min="0" max="1439" value="0"
      oninput="onSliderChange()" />
    <div class="reset-btn">
      <button onclick="resetToNow()">↺ Reset to live baseline</button>
    </div>
  </div>

  <div class="clock-grid" id="clockGrid"></div>
</div>

<div id="toast"></div>

<script>
// ── THEME INTERACTIVE MANAGEMENT ────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  const track = document.getElementById('toggleTrack');
  const thumb = document.getElementById('toggleThumb');
  const label = document.getElementById('themeLabel');
  if (isDark) {
    track.classList.remove('on');
    thumb.textContent = '☀️';
    label.textContent = 'Light mode';
    localStorage.setItem('zonesync-theme', 'light');
  } else {
    track.classList.add('on');
    thumb.textContent = '🌙';
    label.textContent = 'Dark mode';
    localStorage.setItem('zonesync-theme', 'dark');
  }
}

// ── MASTER TERMINAL DATA STATE ──────────────────
let trackedCities = [
  { name: "Bengaluru, India", zone: "IST",  iana: "Asia/Kolkata" },
  { name: "London, United Kingdom", zone: "GMT",  iana: "Europe/London" },
  { name: "New York, USA",  zone: "EST",  iana: "America/New_York" },
  { name: "Los Angeles, USA", zone: "PST", iana: "America/Los_Angeles" },
  { name: "Tokyo, Japan",  zone: "JST",  iana: "Asia/Tokyo" }
];

let homeCityIana = "Asia/Kolkata"; 
let baseUTCms = null;
let baseLocalMs = null;
let usingOnlineTime = false;
let scrubOffsetMinutes = 0;
let isScrubbing = false;
let activeSuggestionIndex = -1; 
let currentSuggestions = [];    
let debounceTimer;              

// ── CLOCK SYNCHRONIZATION PORTS ────────────────
async function fetchOnlineTime() {
  const badge = document.getElementById('timeSourceBadge');
  const badgeText = document.getElementById('badgeText');

  const apis = [
    { url: 'https://worldtimeapi.org/api/timezone/UTC', parse: d => new Date(d.utc_datetime).getTime() },
    { url: 'https://timeapi.io/api/Time/current/zone?timeZone=UTC', parse: d => new Date(d.dateTime + 'Z').getTime() },
  ];

  for (const api of apis) {
    try {
      const t0 = performance.now();
      const res = await fetch(api.url);
      const json = await res.json();
      const t1 = performance.now();
      const rtt = (t1 - t0) / 2;
      baseUTCms = api.parse(json) + rtt;
      baseLocalMs = performance.now();
      usingOnlineTime = true;
      badge.classList.add('live');
      badgeText.textContent = 'Atomic Network Baseline Layer Connected';
      return;
    } catch (e) {}
  }

  baseUTCms = Date.now();
  baseLocalMs = performance.now();
  usingOnlineTime = false;
  badge.classList.remove('live');
  badgeText.textContent = 'Temporal Backup: Local Client Clock';
}

function getCurrentUTCms() {
  if (baseUTCms === null) return Date.now();
  return baseUTCms + (performance.now() - baseLocalMs);
}

function getCityMinutes(city, utcMs) {
  const date = new Date(utcMs + scrubOffsetMinutes * 60_000);
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: city.iana,
    hour: 'numeric', minute: 'numeric', second: 'numeric',
    hour12: false, day: 'numeric'
  }).formatToParts(date);
  const get = type => parseInt(parts.find(p => p.type === type)?.value || '0');
  let h = get('hour'); const m = get('minute'); const s = get('second');
  if (h === 24) h = 0;
  return { hours: h, minutes: m, seconds: s };
}

function getDayOffset(city, utcMs) {
  const effectiveMs = utcMs + scrubOffsetMinutes * 60_000;
  
  const getDayNum = (tz) => {
    const parts = new Intl.DateTimeFormat('en-US', { timeZone: tz, day: 'numeric' }).formatToParts(new Date(effectiveMs));
    return parseInt(parts.find(p => p.type === 'day')?.value || '0', 10);
  };

  const targetDay = getDayNum(city.iana);
  const utcDay = getDayNum('UTC');
  
  let diff = targetDay - utcDay;
  if (diff > 1) diff = -1;
  if (diff < -1) diff = 1;
  
  return diff;
}

function getFormattedCalendarDate(iana, utcMs) {
  const effectiveMs = utcMs + scrubOffsetMinutes * 60_000;
  return new Intl.DateTimeFormat('en-US', {
    timeZone: iana,
    weekday: 'short',
    month: 'short',
    day: 'numeric'
  }).format(new Date(effectiveMs));
}

function fmt2(n) { return String(n).padStart(2, '0'); }

function getUTCOffsetStr(ianaZone) {
  try {
    const p = new Intl.DateTimeFormat('en', { timeZone: ianaZone, timeZoneName: 'shortOffset' }).formatToParts(new Date());
    return (p.find(x => x.type === 'timeZoneName')?.value || '').replace('GMT', 'UTC');
  } catch { return ''; }
}

// ── DYNAMIC COLOR CONDITION INTERPOLATOR ────────
function getAtmosphericClass(hours) {
  if (hours >= 5 && hours < 12)  return { name: "ambient-morning", icon: "🌅" };
  if (hours >= 12 && hours < 17) return { name: "ambient-afternoon", icon: "☀️" };
  if (hours >= 17 && hours < 21) return { name: "ambient-evening", icon: "🌇" };
  return { name: "ambient-night", icon: "🌙" };
}

// ── GRID RENDERING GRAPHICS CONTROLLER ──────────
function renderClocks() {
  if (baseUTCms === null) return;
  const utcMs = getCurrentUTCms();
  const grid = document.getElementById('clockGrid');
  const sliderDisplay = document.getElementById('sliderDisplay');
  const labelText = document.getElementById('scrubberLabel');

  const homeTarget = trackedCities.find(c => c.iana === homeCityIana) || trackedCities[0];
  if (homeTarget) {
    const homeParts = getCityMinutes(homeTarget, utcMs);
    const homeAmPm = homeParts.hours >= 12 ? 'PM' : 'AM';
    const homeH12 = (homeParts.hours % 12) || 12;
    labelText.textContent = `⏱ Home Time Core Matrix — [${homeTarget.name.split(',')[0]}]`;
    
    sliderDisplay.textContent = isScrubbing
      ? `Simulated Pivot: ${homeH12}:${fmt2(homeParts.minutes)} ${homeAmPm}`
      : `Live Tracking — ${homeH12}:${fmt2(homeParts.minutes)} ${homeAmPm}`;
  }

  const activeId = document.activeElement ? document.activeElement.id : null;
  const selectionStart = document.activeElement ? document.activeElement.selectionStart : null;

  grid.innerHTML = '';
  trackedCities.forEach((city, i) => {
    const { hours, minutes, seconds } = getCityMinutes(city, utcMs);
    const ampm = hours >= 12 ? 'PM' : 'AM';
    const h12 = (hours % 12) || 12;
    const dayOff = getDayOffset(city, utcMs);
    const utcStr = getUTCOffsetStr(city.iana);
    const dateLabel = getFormattedCalendarDate(city.iana, utcMs);
    const isHome = city.iana === homeCityIana;

    const weatherMeta = getAtmosphericClass(hours);

    let dayPillHtml = `<span class="day-pill">Same cycle</span>`;
    if (dayOff > 0) dayPillHtml = `<span class="day-pill ahead">+${dayOff} Phase</span>`;
    if (dayOff < 0) dayPillHtml = `<span class="day-pill behind">${dayOff} Phase</span>`;

    grid.innerHTML += `
      <div class="clock-card ${isHome ? 'is-home' : ''} ${weatherMeta.name}">
        <div class="card-header">
          <div class="city-identity">
            <span class="status-orb" title="Local atmospheric frame state">${weatherMeta.icon}</span>
            <div>
              <div class="city-name" title="${city.name}">${city.name.split(',')[0]}</div>
              <div class="tz-info">${city.zone} · ${utcStr}</div>
            </div>
          </div>
          <span class="date-badge">${dateLabel}</span>
        </div>
        <div class="time-display-row">
          <div class="time-input-container">
            <div class="input-time-engine">
              <input type="text" maxlength="2" id="h-${i}" value="${fmt2(h12)}" 
                onfocus="this.select()" onkeydown="handleTimeInput(event, ${i}, 'h')" onblur="commitTimeInput(${i})">
              <span class="time-separator divider-dots">:</span>
              <input type="text" maxlength="2" id="m-${i}" value="${fmt2(minutes)}" 
                onfocus="this.select()" onkeydown="handleTimeInput(event, ${i}, 'm')" onblur="commitTimeInput(${i})">
            </div>
          </div>
          <span class="seconds-counter">${fmt2(seconds)}</span>
          <span class="ampm-trigger" onclick="toggleAmPm(${i})">${ampm}</span>
        </div>
        <div class="card-footer">
          ${dayPillHtml}
          <div class="action-icons">
            <button class="home-btn" title="Lock down as relative space home anchor" onclick="setHomeBase(${i})">⚓ Anchor</button>
            <button class="remove-btn" title="Drop entity node" onclick="removeCity(${i})">✕ Wipe</button>
          </div>
        </div>
      </div>`;
  });

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) {
      el.focus();
      if (selectionStart !== null) el.setSelectionRange(selectionStart, selectionStart);
    }
  }
}

// ── DIRECT VALUE INTERACTION FIELD MATRIX ──────
function handleTimeInput(e, cityIndex, type) {
  if (e.key === 'Enter') { e.target.blur(); return; }
  if (!/[0-9]/.test(e.key) && e.key !== 'Backspace' && e.key !== 'ArrowLeft' && e.key !== 'ArrowRight' && e.key !== 'Tab') {
    if(!e.metaKey && !e.ctrlKey) e.preventDefault();
  }
}

function commitTimeInput(cityIndex) {
  const hInput = document.getElementById(`h-${cityIndex}`);
  const mInput = document.getElementById(`m-${cityIndex}`);
  if (!hInput || !mInput) return;

  const hVal = parseInt(hInput.value) || 12;
  const mVal = parseInt(mInput.value) || 0;
  
  const city = trackedCities[cityIndex];
  const utcMs = getCurrentUTCms();
  const currentParts = getCityMinutes(city, utcMs);
  const currentAmPm = currentParts.hours >= 12 ? 'PM' : 'AM';
  
  let targetHours = hVal % 12;
  if (currentAmPm === 'PM') targetHours += 12;
  
  isScrubbing = true;
  const currentCityMinutes = currentParts.hours * 60 + currentParts.minutes;
  const targetCityMinutes = targetHours * 60 + mVal;
  
  scrubOffsetMinutes += (targetCityMinutes - currentCityMinutes);
  updateSliderElement();
  renderClocks();
}

function toggleAmPm(cityIndex) {
  isScrubbing = true;
  const { hours } = getCityMinutes(trackedCities[cityIndex], getCurrentUTCms());
  scrubOffsetMinutes += (hours >= 12) ? -720 : 720;
  updateSliderElement();
  renderClocks();
}

function setHomeBase(index) {
  homeCityIana = trackedCities[index].iana;
  renderClocks();
}

function updateSliderElement() {
  if (baseUTCms === null) return;
  const d = new Date(getCurrentUTCms() + scrubOffsetMinutes * 60_000);
  document.getElementById('masterSlider').value = d.getUTCHours() * 60 + d.getUTCMinutes();
}

// ── TIMELINE CONTROLLER INPUT ROUTINES ──────────
function syncSliderToNow() {
  if (baseUTCms === null) return;
  const d = new Date(getCurrentUTCms());
  document.getElementById('masterSlider').value = d.getUTCHours() * 60 + d.getUTCMinutes();
}

function onSliderChange() {
  if (baseUTCms === null) return;
  isScrubbing = true;
  const sliderVal = parseInt(document.getElementById('masterSlider').value);
  const d = new Date(getCurrentUTCms());
  const nowUTC = d.getUTCHours() * 60 + d.getUTCMinutes();
  scrubOffsetMinutes = sliderVal - nowUTC;
  renderClocks();
}

function resetToNow() {
  isScrubbing = false;
  scrubOffsetMinutes = 0;
  syncSliderToNow();
  renderClocks();
}

// ── DYNAMIC SYSTEM GEO SEARCH LOGIC ENGINE ──────
function debounceSearch(val) {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => fetchGlobalCities(val), 300);
}

async function fetchGlobalCities(query) {
  const box = document.getElementById('suggestions');
  const q = query.trim().toLowerCase();
  
  if (q.length < 2) { box.style.display = 'none'; activeSuggestionIndex = -1; return; }

  try {
    const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=en&format=json`);
    const data = await res.json();

    if (!data.results || data.results.length === 0) {
      box.style.display = 'none';
      activeSuggestionIndex = -1;
      return;
    }

    currentSuggestions = data.results
      .filter(item => item.timezone)
      .map(item => {
        const regionToken = item.admin1 ? `${item.admin1}, ` : '';
        return {
          name: `${item.name}, ${regionToken}${item.country_code.toUpperCase()}`,
          zone: item.timezone.split('/').pop().replace(/_/g, ' '),
          iana: item.timezone
        };
      });

    if (!currentSuggestions.length) { box.style.display = 'none'; return; }

    box.innerHTML = currentSuggestions.map((c, idx) =>
      `<div class="suggestion-item" id="sug-${idx}" onclick="addDynamicCity(${idx})">
        <span>${c.name}</span>
        <span class="tz-hint">${c.zone}</span>
      </div>`
    ).join('');
    box.style.display = 'block';
    activeSuggestionIndex = -1;

  } catch (error) {
    console.error("Spatial coordinate matrix system dropped out:", error);
  }
}

function handleSearchKey(e) {
  const box = document.getElementById('suggestions');
  const items = box.querySelectorAll('.suggestion-item');
  
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (activeSuggestionIndex < items.length - 1) {
      activeSuggestionIndex++;
      updateActiveSuggestionVisuals(items);
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (activeSuggestionIndex > 0) {
      activeSuggestionIndex--;
      updateActiveSuggestionVisuals(items);
    }
  } else if (e.key === 'Enter') {
    if (activeSuggestionIndex >= 0 && items[activeSuggestionIndex]) {
      items[activeSuggestionIndex].click();
    } else if (currentSuggestions.length > 0) {
      addDynamicCity(0);
    } else {
      showToast("No locations found matching search parameters.");
    }
  } else if (e.key === 'Escape') {
    box.style.display = 'none';
    activeSuggestionIndex = -1;
  }
}

function updateActiveSuggestionVisuals(items) {
  items.forEach((item, idx) => {
    item.style.backgroundColor = (idx === activeSuggestionIndex) ? 'rgba(124, 109, 250, 0.15)' : '';
  });
}

function addDynamicCity(index) {
  const city = currentSuggestions[index];
  if (city && !trackedCities.some(c => c.iana === city.iana && c.name === city.name)) {
    trackedCities.push(city);
    renderClocks();
  }
  document.getElementById('citySearch').value = '';
  document.getElementById('suggestions').style.display = 'none';
  activeSuggestionIndex = -1;
}

function removeCity(i) {
  if (trackedCities[i].iana === homeCityIana && trackedCities.length > 1) {
    homeCityIana = trackedCities[i === 0 ? 1 : 0].iana;
  }
  trackedCities.splice(i, 1);
  renderClocks();
}

// ── NOTIFICATION MANAGER ──────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) document.getElementById('suggestions').style.display = 'none';
});

// ── CORE ENVIRONMENT START SEED ────────────────
(async () => {
  const savedTheme = localStorage.getItem('zonesync-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  
  const track = document.getElementById('toggleTrack');
  const thumb = document.getElementById('toggleThumb');
  const label = document.getElementById('themeLabel');
  
  if (savedTheme === 'light') {
    track.classList.remove('on');
    thumb.textContent = '☀️';
    label.textContent = 'Light mode';
  } else {
    track.classList.add('on');
    thumb.textContent = '🌙';
    label.textContent = 'Dark mode';
  }

  await fetchOnlineTime();
  syncSliderToNow();
  renderClocks();
  setInterval(() => {
    if (!isScrubbing) syncSliderToNow();
    renderClocks();
  }, 1000);
  setInterval(fetchOnlineTime, 10 * 60 * 1000);
})();
</script>
