<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TimeZoneSync — Understandable World Clock</title>
  <meta name="description" content="Simple world clock for planning meetings across time zones." />
  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --text: #2f3343;
      --muted: #7f859e;
      --border: #d9dceb;
      --accent: #6b63f6;
      --danger: #ca3b50;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: var(--bg); color: var(--text); padding: 28px; }
    .wrap { max-width: 1200px; margin: 0 auto; }
    h1 { margin: 0; font-size: 30px; }
    .subtitle { margin: 6px 0 20px; color: var(--muted); }

    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 16px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .label { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); font-weight: 600; }

    input, button { border-radius: 10px; border: 1px solid var(--border); padding: 10px 12px; font-size: 14px; background: #fff; color: var(--text); }
    input { min-width: 240px; }
    button { cursor: pointer; }
    button:hover { border-color: var(--accent); }

    .scrubber-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 12px; }
    .scrubber-value { color: var(--accent); font-size: 32px; font-weight: 700; }
    .ticks { display: flex; justify-content: space-between; color: var(--muted); font-size: 12px; margin-bottom: 10px; }
    input[type=range] { width: 100%; accent-color: var(--accent); }
    .help { margin-top: 10px; color: var(--muted); font-size: 13px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); gap: 12px; }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .city { font-weight: 700; font-size: 18px; }
    .zone { color: var(--muted); font-size: 12px; margin: 3px 0 8px; }
    .time { font-size: 32px; font-weight: 700; }
    .date { color: var(--muted); font-size: 13px; margin: 6px 0 10px; }
    .remove { color: var(--danger); border-color: #f3c8d0; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>TimeZoneSync</h1>
  <p class="subtitle">Clear meeting planner: add cities, then drag the time scrubber to compare local times.</p>

  <section class="panel">
    <div class="label">Cities to compare</div>
    <div class="row" style="margin-top:10px;">
      <input id="cityInput" list="cityList" placeholder="Type a city name (e.g. Chicago)" />
      <datalist id="cityList"></datalist>
      <button onclick="addCityFromInput()">Add city</button>
      <button onclick="resetDefaults()">Reset defaults</button>
      <button onclick="returnToLiveTime()">Return to live time</button>
    </div>
  </section>

  <section class="panel">
    <div class="scrubber-top">
      <div class="label">Time scrubber — drag to explore</div>
      <div id="scrubberValue" class="scrubber-value">Live — UTC --:--</div>
    </div>
    <div class="ticks"><span>12 AM</span><span>6 AM</span><span>12 PM</span><span>6 PM</span><span>11:59 PM</span></div>
    <input type="range" id="utcSlider" min="0" max="1439" value="0" oninput="onSliderChange()" />
    <div class="help">What this does: choose a UTC time, and all city cards update to that exact moment.</div>
  </section>

  <section id="clockGrid" class="grid"></section>
</div>

<script>
const ALL_CITIES = [
  ["New York","America/New_York"], ["Los Angeles","America/Los_Angeles"], ["Chicago","America/Chicago"], ["Toronto","America/Toronto"],
  ["London","Europe/London"], ["Paris","Europe/Paris"], ["Berlin","Europe/Berlin"],
  ["Dubai","Asia/Dubai"], ["Mumbai","Asia/Kolkata"], ["Singapore","Asia/Singapore"], ["Seoul","Asia/Seoul"], ["Tokyo","Asia/Tokyo"],
  ["Sydney","Australia/Sydney"], ["Auckland","Pacific/Auckland"], ["Honolulu","Pacific/Honolulu"]
].map(([name, iana]) => ({ name, iana }));

const DEFAULTS = ["New York", "London", "Dubai", "Tokyo"];
let tracked = DEFAULTS.map(n => ALL_CITIES.find(c => c.name === n));
let scrubOffsetMinutes = 0;
let isScrubbing = false;

function fillDatalist() {
  cityList.innerHTML = ALL_CITIES.map(c => `<option value="${c.name}">`).join('');
}

function formatCityTime(date, iana) {
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: iana, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true,
    weekday: 'short', month: 'short', day: 'numeric'
  }).formatToParts(date);
  const get = t => parts.find(x => x.type === t)?.value || '';
  return { time: `${get('hour')}:${get('minute')}:${get('second')} ${get('dayPeriod')}`, date: `${get('weekday')}, ${get('month')} ${get('day')}` };
}

function getOffset(iana, date) {
  const parts = new Intl.DateTimeFormat('en', { timeZone: iana, timeZoneName: 'shortOffset' }).formatToParts(date);
  return (parts.find(x => x.type === 'timeZoneName')?.value || 'UTC').replace('GMT', 'UTC');
}

function getReferenceDate() { return new Date(Date.now() + scrubOffsetMinutes * 60000); }

function syncSliderToNow() {
  const d = new Date();
  utcSlider.value = d.getUTCHours() * 60 + d.getUTCMinutes();
}

function setScrubberLabel(date) {
  const utc = new Intl.DateTimeFormat('en-US', { timeZone: 'UTC', hour: '2-digit', minute: '2-digit', hour12: true }).format(date);
  scrubberValue.textContent = `${isScrubbing ? 'Preview' : 'Live'} — UTC ${utc}`;
}

function render() {
  const reference = getReferenceDate();
  setScrubberLabel(reference);
  clockGrid.innerHTML = tracked.map((city, i) => {
    const f = formatCityTime(reference, city.iana);
    return `<article class="card">
      <div class="city">${city.name}</div>
      <div class="zone">${city.iana} · ${getOffset(city.iana, reference)}</div>
      <div class="time">${f.time}</div>
      <div class="date">${f.date}</div>
      <button class="remove" onclick="removeCity(${i})">Remove</button>
    </article>`;
  }).join('');
}

function onSliderChange() {
  isScrubbing = true;
  const sliderMins = Number(utcSlider.value);
  const now = new Date();
  scrubOffsetMinutes = sliderMins - (now.getUTCHours() * 60 + now.getUTCMinutes());
  render();
}

function addCityFromInput() {
  const q = cityInput.value.trim().toLowerCase();
  const city = ALL_CITIES.find(c => c.name.toLowerCase() === q);
  if (!city || tracked.some(c => c.name === city.name)) return;
  tracked.push(city);
  cityInput.value = '';
  render();
}
function removeCity(i) { tracked.splice(i, 1); render(); }
function resetDefaults() { tracked = DEFAULTS.map(n => ALL_CITIES.find(c => c.name === n)); returnToLiveTime(); }
function returnToLiveTime() { isScrubbing = false; scrubOffsetMinutes = 0; syncSliderToNow(); render(); }

fillDatalist();
returnToLiveTime();
setInterval(() => { if (!isScrubbing) syncSliderToNow(); render(); }, 1000);
</script>
</body>
</html>
