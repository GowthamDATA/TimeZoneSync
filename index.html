<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZoneSync — Live World Clock & Timezone Converter</title>
  <meta name="description" content="ZoneSync: Free live world clock showing current time in every timezone. Compare cities, convert time zones, and plan across the globe in real time." />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Nunito:wght@400;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── THEME TOKENS ── */
    :root {
      --accent: #7c6dfa;
      --accent2: #f0a05a;
      --red: #f05a5a;
      --green: #4ade80;
    }

    [data-theme="dark"] {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: #2a2a36;
      --text: #f0eff8;
      --muted: #6b6a7e;
      --toggle-icon: "☀️";
      --slider-track: #18181f;
      --card-glow: rgba(124,109,250,0.05);
      --day-bg: #1e1b10;
      --night-bg: #0f0f18;
    }

    [data-theme="light"] {
      --bg: #f4f4f8;
      --surface: #ffffff;
      --surface2: #f0f0f5;
      --border: #dddde8;
      --text: #0f0f1a;
      --muted: #8888a0;
      --toggle-icon: "🌙";
      --slider-track: #e4e4ee;
      --card-glow: rgba(124,109,250,0.03);
      --day-bg: #fffbeb;
      --night-bg: #f1f1f9;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 40px 24px 80px;
      transition: background 0.3s, color 0.3s;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,109,250,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,109,250,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.3s;
    }

    [data-theme="light"] body::before { opacity: 0.5; }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1140px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .brand h1 {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }

    .brand h1 .logo-icon {
      font-size: 26px;
      line-height: 1;
    }

    .brand h1 .brand-name { color: var(--text); }
    .brand h1 .brand-dot { color: var(--accent); }

    .brand h1 span.pulse-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2s infinite;
      margin-left: 2px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.75); }
    }

    .brand-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 5px;
      font-family: 'DM Mono', monospace;
    }

    #timeSourceBadge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      margin-top: 8px;
      transition: all 0.3s;
    }

    #timeSourceBadge.live {
      border-color: rgba(124,109,250,0.4);
      color: var(--accent);
      background: rgba(124,109,250,0.07);
    }

    #timeSourceBadge .indicator {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    #timeSourceBadge.live .indicator {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
    }

    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .theme-toggle-label {
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
    }

    .toggle-track {
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      position: relative;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
    }

    .toggle-track.on {
      background: rgba(124,109,250,0.2);
      border-color: rgba(124,109,250,0.4);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform 0.25s cubic-bezier(.4,0,.2,1), background 0.25s;
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .toggle-track.on .toggle-thumb {
      transform: translateX(20px);
      background: var(--accent);
    }

    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 380px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px 13px 44px;
      font-size: 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
    }

    .search-wrap input::placeholder { color: var(--muted); }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,109,250,0.12);
    }

    .search-wrap svg {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 16px; height: 16px;
      pointer-events: none;
    }

    #suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    #suggestions .suggestion-item {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s;
      color: var(--text);
    }

    #suggestions .suggestion-item:hover { background: rgba(124,109,250,0.1); }

    #suggestions .suggestion-item .tz-hint {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* ── TIMELINE SCRUBBER ── */
    .timeline-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 32px;
      transition: background 0.3s, border-color 0.3s;
    }

    .timeline-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .timeline-label {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    #sliderDisplay {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
    }

    .tick-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    .tick-row span {
      font-size: 10px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    input[type="range"].time-slider {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--slider-track);
      outline: none;
      cursor: pointer;
      transition: background 0.3s;
    }

    input[type="range"].time-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      border: 3px solid var(--bg);
      box-shadow: 0 0 10px rgba(124,109,250,0.4);
      cursor: pointer;
      transition: transform 0.1s, border-color 0.3s;
      margin-top: -8px;
    }

    input[type="range"].time-slider::-webkit-slider-thumb:hover { transform: scale(1.15); }

    .reset-btn {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .reset-btn button {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── CLOCK GRID ── */
    .clock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .clock-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: border-color 0.3s, transform 0.2s, background-color 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    .clock-card.is-home {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(124,109,250,0.15);
    }

    .clock-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 90% 10%, var(--card-glow), transparent 60%);
      pointer-events: none;
    }

    .clock-card:hover {
      transform: translateY(-3px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .city-name {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .tz-label {
      font-size: 11px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-top: 3px;
    }

    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      flex-shrink: 0;
    }

    .badge-day { background: #fef3c7; color: #92610a; }
    .badge-night { background: #1a1a2e; color: #a9a6d8; border: 1px solid #2e2e50; }

    [data-theme="light"] .badge-night {
      background: #2a2a50;
      color: #c0bdee;
    }

    .time-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .time-input-container {
      display: inline-flex;
      align-items: baseline;
      font-family: 'Nunito', sans-serif;
      font-size: 44px;
      font-weight: 900;
      color: var(--text);
    }

    .time-input-container input {
      background: transparent;
      border: none;
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      color: inherit;
      width: 58px;
      padding: 0;
      text-align: center;
      outline: none;
      border-radius: 6px;
      transition: background-color 0.2s;
    }

    .time-input-container input:focus {
      background-color: rgba(124,109,250,0.15);
    }

    .time-separator {
      animation: blink 2s infinite;
      user-select: none;
      padding: 0 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .time-seconds {
      font-family: 'Nunito', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin-left: 6px;
    }

    .time-ampm {
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background-color 0.2s;
      margin-left: 4px;
    }

    .time-ampm:hover {
      background-color: rgba(124,109,250,0.15);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .day-pill {
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .day-pill.ahead { color: var(--accent2); border: 1px solid rgba(240,160,90,0.25); }
    .day-pill.behind { color: var(--red); border: 1px solid rgba(240,90,90,0.2); }

    .action-icons {
      display: flex;
      align-items:
