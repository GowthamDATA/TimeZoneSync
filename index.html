<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZoneSync — Premium World Clock & Timezone Matrix</title>
  <meta name="description" content="ZoneSync: Free live world clock showing current time in every timezone. Compare cities, convert time zones, and plan across the globe in real time." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ── PREMIUM SYSTEM DESIGN PROFILE TOKENS ── */
    :root {
      --accent: #7c6dfa;
      --accent-rgb: 124, 109, 250;
      --accent2: #f0a05a;
      --red: #f05a5a;
      --green: #4ade80;
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="dark"] {
      --bg: #0d0d14;
      --surface: rgba(22, 22, 34, 0.65);
      --surface-hover: rgba(30, 30, 46, 0.85);
      --surface2: #161622;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(124, 109, 250, 0.4);
      --text: #f0eff8;
      --muted: #8e8da4;
      --slider-track: #1c1c2b;
      --glass-glow: rgba(124, 109, 250, 0.05);
      --input-bg: rgba(255, 255, 255, 0.05);
    }

    [data-theme="light"] {
      --bg: #f4f4f8;
      --surface: rgba(255, 255, 255, 0.75);
      --surface-hover: rgba(255, 255, 255, 0.9);
      --surface2: #eaeaea;
      --border: rgba(0, 0, 0, 0.08);
      --border-hover: rgba(124, 109, 250, 0.4);
      --text: #0f0f1a;
      --muted: #6e6e82;
      --slider-track: #e2e2ec;
      --glass-glow: rgba(124, 109, 250, 0.01);
      --input-bg: rgba(0, 0, 0, 0.04);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      padding: 40px 24px 80px;
      transition: background 0.4s ease, color 0.4s ease;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124, 109, 250, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 109, 250, 0.02) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── HEADER LAYOUT ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
    }

    .brand h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1;
    }

    .brand h1 .logo-icon { animation: rotateGlobe 20s linear infinite; display: inline-block; }
    @keyframes rotateGlobe { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .brand h1 .brand-dot { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 14px;
      height: 48px;
      transition: var(--transition-smooth);
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      background: rgba(124, 109, 250, 0.02);
    }

    .theme-toggle-label {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .toggle-track {
      width: 44px; height: 22px;
      border-radius: 30px;
      background: var(--slider-track);
      border: 1px solid var(--border);
      position: relative;
      transition: var(--transition-smooth);
    }

    .toggle-track.on {
      background: rgba(var(--accent-rgb), 0.15);
      border-color: rgba(var(--accent-rgb), 0.3);
    }

    .toggle-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), background 0.25s;
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .toggle-track.on .toggle-thumb {
      transform: translateX(22px);
      background: var(--accent);
    }

    .search-wrap {
      position: relative;
      width: 360px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px 14px 48px;
      font-size: 14px;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      height: 48px;
      transition: var(--transition-smooth);
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(124, 109, 250, 0.12);
      background: var(--surface-hover);
    }

    .search-wrap svg {
      position: absolute;
      left: 16px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 18px; height: 18px;
      pointer-events: none;
      transition: var(--transition-smooth);
    }

    .search-wrap input:focus + svg { color: var(--accent); }

    #suggestions {
      position: absolute;
      top: calc(100% + 8px);
      left: 0; right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      z-index: 100;
      display: none;
      box-shadow: 0 12px 32px rgba(0,0,0,0.25);
    }

    #suggestions .suggestion-item {
      padding: 12px 18px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s ease;
      color: var(--text);
    }

    #suggestions .suggestion-item:hover { background: rgba(124, 109, 250, 0.08); }
    #suggestions .suggestion-item .tz-hint { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    /* ── TIME SYSTEM SCRUBBER TIMELINE CARD ── */
    .timeline-card {
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px 32px;
      margin-bottom: 40px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.02);
    }

    .timeline-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .timeline-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 500;
    }

    #sliderDisplay {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(124, 109, 250, 0.06);
      padding: 4px 12px;
      border-radius: 8px;
      border: 1px solid rgba(124, 109, 250, 0.15);
    }

    .tick-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .tick-row span {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    input[type="range"].time-slider {
      -webkit-appearance: none;
      width: 100%; height: 6px;
      border-radius: 4px;
      background: var(--slider-track);
      outline: none;
      cursor: pointer;
    }

    input[type="range"].time-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: var(--accent);
      border: 4px solid var(--surface2);
      box-shadow: 0 0 12px rgba(124, 109, 250, 0.4);
      cursor: pointer;
      transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: -9px;
    }

    input[type="range"].time-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

    .timeline-bottom-controls {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .reset-btn button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 8px 18px;
      border-radius: 10px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .reset-btn button:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,109,250,0.02); }

    /* ── CLOCK DASHBOARD GRID ── */
    .clock-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .clock-card {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .clock-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-hover);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
    }

    .clock-card.is-home {
      border-color: rgba(124, 109, 250, 0.4);
      box-shadow: 0 8px 24px rgba(124, 109, 250, 0.08);
    }

    /* Ambient Dynamic Glowing Background Layers */
    .clock-card::after {
      content: '';
      position: absolute;
      width: 260px; height: 260px;
      top: -100px; right: -100px;
      border-radius: 50%;
      z-index: 1;
      filter: blur(65px);
      opacity: 0;
      transition: background 0.6s ease, opacity 0.6s ease;
      pointer-events: none;
    }

    /* Target precise local lighting shifts with adaptive color boundaries */
    .clock-card.ambient-morning::after   { background: linear-gradient(135deg, #ff9d6c, #ffdb8b); opacity: 0.25; }
    .clock-card.ambient-afternoon::after { background: linear-gradient(135deg, #4facfe, #00f2fe); opacity: 0.22; }
    .clock-card.ambient-evening::after   { background: linear-gradient(135deg, #f857a6, #ff5858); opacity: 0.28; }
    .clock-card.ambient-night::after     { background: linear-gradient(135deg, #30197d, #ec38bc); opacity: 0.35; }

    /* High contrast text support rules for distinct conditions */
    .clock-card.ambient-morning, .clock-card.ambient-afternoon {
      --text: #0f0f1a;
      --muted: #555566;
      --border: rgba(0, 0, 0, 0.08);
    }
    
    [data-theme="dark"] .clock-card.ambient-morning, [data-theme="dark"] .clock-card.ambient-afternoon {
      background: rgba(255, 255, 255, 0.88);
    }
    [data-theme="light"] .clock-card.ambient-morning, [data-theme="light"] .clock-card.ambient-afternoon {
      background: rgba(255, 255, 255, 0.95);
    }

    .clock-card.ambient-evening, .clock-card.ambient-night {
      --text: #f0eff8;
      --muted: #a4a3bc;
      --border: rgba(255, 255, 255, 0.1);
    }
    
    [data-theme="dark"] .clock-card.ambient-evening, [data-theme="dark"] .clock-card.ambient-night {
      background: rgba(20, 20, 32, 0.75);
    }
    [data-theme="light"] .clock-card.ambient-evening, [data-theme="light"] .clock-card.ambient-night {
      background: rgba(15, 15, 24, 0.85);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 2;
    }

    .city-identity {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-orb {
      font-size: 22px;
      line-height: 1;
    }

    .city-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .tz-info {
      font-size: 12px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
    }

    .date-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      background: rgba(124, 109, 250, 0.08);
      border: 1px solid var(--border);
      color: var(--text);
      z-index: 2;
    }

    .time-display-row {
      display: flex;
      align-items: baseline;
      gap: 2px;
      z-index: 2;
    }

    /* ── REDEFINE REFINED TIMELINE TYPOGRAPHY SCALE ── */
    .input-time-engine {
      display: inline-flex;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 38px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text);
    }

    .input-time-engine input {
      background: transparent;
      border: 1px solid transparent;
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      color: var(--text);
      width: 58px;
      padding: 0;
      text-align: center;
      outline: none;
      border-radius: 8px;
      transition: background-color 0.2s;
    }

    .input-time-engine input:focus {
      background: rgba(124, 109, 250, 0.12);
    }

    .divider-dots {
      animation: flashDot 2s infinite;
      user-select: none;
      opacity: 0.8;
      padding: 0 1px;
    }

    @keyframes flashDot { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

    .seconds-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      margin-left: 4px;
    }

    .ampm-trigger {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
      padding: 4px 6px;
      border-radius: 6px;
      transition: var(--transition-smooth);
      margin-left: 4px;
    }

    .ampm-trigger:hover {
      background: rgba(124, 109, 250, 0.15);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      font-size: 12px;
      z-index: 2;
    }

    .day-pill {
      padding: 4px 10px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      background: rgba(0, 0, 0, 0.05);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .day-pill.ahead { color: var(--accent2); background: rgba(240,160,90,0.06); border: 1px solid rgba(240,160,90,0.15); }
    .day-pill.behind { color: var(--red); background: rgba(240,90,90,0.06); border: 1px solid rgba(240,90,90,0.15); }

    .footer-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .home-btn, .remove-btn {
      background: transparent;
      border: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      opacity: 0.5;
      padding: 4px 8px;
      border-radius: 6px;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: var(--transition-smooth);
    }

    .clock-card.is-home .home-btn { color: var(--accent2); opacity: 1; font-weight: 600; }
    .remove-btn { color: var(--red); }

    .clock-card:hover .home-btn,
    .clock-card:hover .remove-btn { opacity: 0.8; }
    .home-btn:hover, .remove-btn:hover { opacity: 1 !important; background: rgba(124, 109, 250, 0.08); }

    /* Toast Overlays */
    #toast {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      opacity: 0;
      transition: var(--transition-smooth);
      pointer-events: none;
      z-index: 999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      body { padding: 24px 16px 60px; }
      header { flex-direction: row; justify-content: space-between; align-items: center; }
      .header-right { width: auto; justify-content: flex-end; }
      .search-wrap { width: 260px; }
      .timeline-bottom-controls { flex-direction: column; align-items: stretch; }
    }

    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .header-right { width: 100%; justify-content: space-between; }
      .search-wrap { width: 100%; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="brand">
      <h1>
        <span class="logo-icon">🌐</span>
        <span class="brand-name">Zone<span class="brand-dot">Sync</span></span>
      </h1>
    </div>

    <div class="header-right">
      <div class="theme-toggle" onclick="toggleTheme()" title="Switch canvas lighting profiles">
        <span class="theme-toggle-label" id="themeLabel">Dark mode</span>
        <div class="toggle-track on" id="toggleTrack">
          <div class="toggle-thumb" id="toggleThumb">🌙</div>
        </div>
      </div>

      <div class="search-wrap">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" id="citySearch" placeholder="Type city, region, or terminal node..."
          autocomplete="off" oninput="debounceSearch(this.value)" onkeydown="handleSearchKey(event)" />
        <div id="suggestions"></div>
      </div>
    </div>
  </header>

  <div class="timeline-card">
    <div class="timeline-top">
      <span class="timeline-label" id="scrubberLabel">⏱ Temporal Slider Engine</span>
      <span id="sliderDisplay">—</span>
    </div>
    <div class="tick-row">
      <span>12 AM</span><span>6 AM</span><span>12 PM</span><span>6 PM</span><span>11:59 PM</span>
    </div>
    <input type="range" id="masterSlider" class="time-slider" min="0" max="1439" value="0"
      oninput="onSliderChange()" />
    
    <div class="timeline-bottom-controls">
      <div class="reset-btn">
        <button onclick="resetToNow()">↺ Reset to live baseline</button>
      </div>
    </div>
  </div>

  <div class="clock-grid" id="clockGrid"></div>
</div>

<div id="toast"></div>

<script>
// ── THEME INTERACTIVE MANAGEMENT ────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  const track = document.getElementById('toggleTrack');
  const thumb = document.getElementById('toggleThumb');
  const label = document.getElementById('themeLabel');
  if (isDark) {
    track.classList.remove('on');
    thumb.textContent = '☀️';
    label.textContent = 'Light mode';
    localStorage.setItem('zonesync-theme', 'light');
  } else {
    track.classList.add('on');
    thumb.textContent = '🌙';
    label.textContent = 'Dark mode';
    localStorage.setItem('zonesync-theme', 'dark');
  }
  renderClocks();
}

// ── GLOBAL TIME DATA ARCHITECTURE STATE ─────────
let trackedCities = [
  { name: "Bengaluru, India", zone: "IST",  iana: "Asia/Kolkata" },
  { name: "London, United Kingdom", zone: "GMT",  iana: "Europe/London" },
  { name: "New York, USA",  zone: "EST",  iana: "America/New_York" },
  { name: "Los Angeles, USA", zone: "PST", iana: "America/Los_Angeles" },
  { name: "Tokyo, Japan",  zone: "JST",  iana: "Asia/Tokyo" }
];

let homeCityIana = "Asia/Kolkata"; 
let baseUTCms = null;
let baseLocalMs = null;
let usingOnlineTime = false;
let scrubOffsetMinutes = 0;
let isScrubbing = false;
let activeSuggestionIndex = -1; 
let currentSuggestions = [];    
let debounceTimer;              

// ── SYNC PORT ROUTINES ──────────────────────────
async function fetchOnlineTime() {
  const apis = [
    { url: 'https://worldtimeapi.org/api/timezone/UTC', parse: d => new Date(d.utc_datetime).getTime() },
    { url: 'https://timeapi.io/api/Time/current/zone?timeZone=UTC', parse: d => new Date(d.dateTime + 'Z').getTime() },
  ];

  for (const api of apis) {
    try {
      const t0 = performance.now();
      const res = await fetch(api.url);
      const json = await res.json();
      const t1 = performance.now();
      const rtt = (t1 - t0) / 2;
      baseUTCms = api.parse(json) + rtt;
      baseLocalMs = performance.now();
      usingOnlineTime = true;
      return;
    } catch (e) {}
  }

  baseUTCms = Date.now();
  baseLocalMs = performance.now();
  usingOnlineTime = false;
}

function getCurrentUTCms() {
  if (baseUTCms === null) return Date.now();
  return baseUTCms + (performance.now() - baseLocalMs);
}

function getCityMinutes(city, utcMs) {
  const date = new Date(utcMs + scrubOffsetMinutes * 60_000);
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: city.iana,
    hour: 'numeric', minute: 'numeric', second: 'numeric',
    hour12: false, day: 'numeric'
  }).formatToParts(date);
  const get = type => parseInt(parts.find(p => p.type === type)?.value || '0');
  let h = get('hour'); const m = get('minute'); const s = get('second');
  if (h === 24) h = 0;
  return { hours: h, minutes: m, seconds: s };
}

function getDayOffset(city, utcMs) {
  const effectiveMs = utcMs + scrubOffsetMinutes * 60_000;
  
  const getDayNum = (tz) => {
    const parts = new Intl.DateTimeFormat('en-US', { timeZone: tz, day: 'numeric' }).formatToParts(new Date(effectiveMs));
    return parseInt(parts.find(p => p.type === 'day')?.value || '0', 10);
  };

  const targetDay = getDayNum(city.iana);
  const utcDay = getDayNum('UTC');
  
  let diff = targetDay - utcDay;
  if (diff > 1) diff = -1;
  if (diff < -1) diff = 1;
  
  return diff;
}

function getFormattedCalendarDate(iana, utcMs) {
  const effectiveMs = utcMs + scrubOffsetMinutes * 60_000;
  return new Intl.DateTimeFormat('en-US', {
    timeZone: iana,
    weekday: 'short',
    month: 'short',
    day: 'numeric'
  }).format(new Date(effectiveMs));
}

// ── FIXED FORMATTER CONTROLLER ──
function fmt2(n) { return String(n).padStart(2, '0'); }

function getUTCOffsetStr(ianaZone) {
  try {
    const p = new Intl.DateTimeFormat('en', { timeZone: ianaZone, timeZoneName: 'shortOffset' }).formatToParts(new Date());
    return (p.find(x => x.type === 'timeZoneName')?.value || '').replace('GMT', 'UTC');
  } catch { return ''; }
}

function getTimezoneOffsetMinutes(iana, baseMs) {
  const d = new Date(baseMs);
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: iana,
    hour: 'numeric', minute: 'numeric', hour12: false
  }).formatToParts(d);
  const hZone = parseInt(parts.find(p => p.type === 'hour')?.value || '0', 10);
  const mZone = parseInt(parts.find(p => p.type === 'minute')?.value || '0', 10);

  const hUtc = d.getUTCHours();
  const mUtc = d.getUTCMinutes();

  let localTotal = hZone * 60 + mZone;
  let utcTotal = hUtc * 60 + mUtc;

  let diff = localTotal - utcTotal;
  if (diff > 720) diff -= 1440;
  if (diff < -720) diff += 1440;
  return diff;
}

// ── CORE ENVIRONMENT CONFIGURATOR ──
function getAtmosphericClass(hours) {
  if (hours >= 5 && hours < 12)  return { name: "ambient-morning", icon: "🌅" };
  if (hours >= 12 && hours < 17) return { name: "ambient-afternoon", icon: "☀️" };
  if (hours >= 17 && hours < 21) return { name: "ambient-evening", icon: "🌇" };
  return { name: "ambient-night", icon: "🌙" };
}
